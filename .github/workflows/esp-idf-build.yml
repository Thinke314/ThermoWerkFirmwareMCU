name: ESP-IDF build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build ESP32-S3 firmware
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          idf.py set-target esp32s3
          idf.py build
